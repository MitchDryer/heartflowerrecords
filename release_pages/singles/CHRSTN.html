<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../styles.css" />
  <title>christine</title>
  <link rel="icon" href="https://media.heartflowerrecords.com/CHRSTN/art.jpg" />
  <style>
    a { color: white; }

    html, body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
      font-family: marion, serif;
      color: white;
    }

body {
  background-color: #0A0835;
  background-image: url("https://media.heartflowerrecords.com/CHRSTN/video.gif");
  background-repeat: repeat-y;
  background-position: center center;
  background-size: cover;

  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

main {
  background-position: 100% 65%;
  flex: 1;
  display: flex;
  flex-direction: column;
}

#playerContainer {
  text-align: center;
  width: 90%;
  max-width: 1000px;
  margin: auto auto 50px auto;
  font-family: inherit;
  color: white;
}

    .player-button {
      background-color: rgba(0, 0, 0, 0);
      color: white;
      border: none;
      border-radius: 0;
      cursor: pointer;
      font-family: inherit;
      font-weight: inherit;
      user-select: none;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s ease;
      margin-top: 10px;
    }

    .player-button:hover {
      background-color: rgba(255, 255, 255, 0.3);
    }

    #timeline {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 0;
      cursor: pointer;
      vertical-align: middle;
      margin: 10px auto 0 auto;
      display: block;
    }

    #timeline::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 8px;
      height: 16px;
      background: white;
      border-radius: 0;
      cursor: pointer;
      margin-top: -5px;
      position: relative;
      z-index: 1;
      box-shadow: none;
      border: none;
    }

    #timeline::-moz-range-thumb {
      width: 8px;
      height: 16px;
      background: white;
      border-radius: 0;
      cursor: pointer;
      border: none;
      box-shadow: none;
    }

    #timeline::-moz-range-track {
      height: 6px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 0;
    }

    #timeDisplay {
      font-family: inherit;
      font-size: 14px;
      font-weight: normal;
      user-select: none;
      margin-top: 10px;
    }

    #playPauseBtn {
      width: 80px;
      height: 30px;
      font-size: 18px;
      margin: 0 auto 8px auto;
      padding-top: 6px;
    }
  </style>
</head>

<body>
  <header>
  </header>

  <main>
    <div style="display: flex; justify-content: center;">
      <a href="../../singles.html">----</a>
    </div>

    <!-- no track text here anymore -->
    <div id="playerContainer">
      <button id="playPauseBtn" class="player-button" aria-label="Play">►</button>

      <input type="range" id="timeline" min="0" max="100" value="0" step="0.01" />

      <div id="timeDisplay">0:00 / 0:00</div>
<br>
<p><em><a href="https://www.instagram.com/feelings.psd">@feelings.psd</em></p>
    </div>

    <audio
      id="smallPlayer"
      src="https://media.heartflowerrecords.com/CHRSTN/CHRSTN.mp3"
      preload="metadata"
    ></audio><br>

    <script>
      const TRACK = {
        title: "christine",
        url: "https://media.heartflowerrecords.com/CHRSTN/CHRSTN.mp3",
        // change these if needed:
        artist: "feelings",
        album: "christine",
        artwork: "https://media.heartflowerrecords.com/CHRSTN/art.jpg"
      };

      const player = document.getElementById("smallPlayer");
      const playPauseBtn = document.getElementById("playPauseBtn");
      const timeline = document.getElementById("timeline");
      const timeDisplay = document.getElementById("timeDisplay");

      function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s.toString().padStart(2, "0")}`;
      }

      function updateTimeDisplay() {
        timeDisplay.textContent = `${formatTime(player.currentTime)} / ${formatTime(player.duration || 0)}`;
      }

      function updateMediaSessionMetadata() {
        if ("mediaSession" in navigator) {
          navigator.mediaSession.metadata = new MediaMetadata({
            title: TRACK.title,
            artist: TRACK.artist,
            album: TRACK.album,
            artwork: [
              { src: TRACK.artwork, sizes: "512x512", type: "image/jpeg" }
            ]
          });
        }
      }

      playPauseBtn.addEventListener("click", () => {
        if (player.paused) {
          player.play();
          playPauseBtn.textContent = "❙❙";
          playPauseBtn.setAttribute("aria-label", "Pause");
        } else {
          player.pause();
          playPauseBtn.textContent = "►";
          playPauseBtn.setAttribute("aria-label", "Play");
        }
      });

      player.addEventListener("loadedmetadata", () => {
        timeline.max = player.duration || 0;
        updateTimeDisplay();
        updateMediaSessionMetadata();
      });

      player.addEventListener("timeupdate", () => {
        timeline.value = player.currentTime || 0;
        updateTimeDisplay();
      });

      timeline.addEventListener("input", () => {
        player.currentTime = Number(timeline.value);
        updateTimeDisplay();
      });

      player.addEventListener("ended", () => {
        playPauseBtn.textContent = "►";
        playPauseBtn.setAttribute("aria-label", "Play");
        timeline.value = 0;
        updateTimeDisplay();
      });

      if ("mediaSession" in navigator) {
        navigator.mediaSession.setActionHandler("play", () => {
          player.play();
          playPauseBtn.textContent = "❙❙";
          playPauseBtn.setAttribute("aria-label", "Pause");
        });

        navigator.mediaSession.setActionHandler("pause", () => {
          player.pause();
          playPauseBtn.textContent = "►";
          playPauseBtn.setAttribute("aria-label", "Play");
        });

        // no next/prev for a single
        navigator.mediaSession.setActionHandler("previoustrack", null);
        navigator.mediaSession.setActionHandler("nexttrack", null);
      }

      // make sure src is correct even if browser cached something weird
      player.src = TRACK.url;
      player.load();
      updateTimeDisplay();
      updateMediaSessionMetadata();
    </script>
  </main>

</body>
<footer></footer>
</html>
